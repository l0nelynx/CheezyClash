name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Acquire libclash
        id: libclash
        uses: ./.github/actions/libclash
        with:
          allow-build-fallback: 'true'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK + NDK 28.2.13676358
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;28.2.13676358 cmake;3.22.1"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble Direct Open Debug
        run: |
          ./gradlew --no-daemon assembleDirectOpenDebug \
            -x :core:buildGoClashArm64V8a \
            -x :core:buildGoClashArmeabiV7a \
            -x :core:buildGoClashX86_64 \
            -x :core:assembleGoJniLibs

      - name: Unit tests
        run: ./gradlew --no-daemon testDirectOpenDebugUnitTest

      - name: Lint
        run: ./gradlew --no-daemon lintDirectOpenDebug
