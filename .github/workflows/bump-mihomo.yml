name: Bump Mihomo

# Runs manually. Updates go.mod / go.sum to a fresh ref of the
# required Go package (default: mihomo@Alpha), attempts to build
# libclash.so locally in this run, and opens a PR into main.
# The merge itself is done by a human.
#
# Pushing to the feature branch triggers build-core.yml (on pull_request),
# which will separately verify the real build with the cache key of the new hash.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "ref (branch / commit / tag). Default: Alpha HEAD."
        type: string
        default: "Alpha"
      replace_with:
        description: |
          Optional: path to the fork for the replace directive.
          Use if the fork retains `module github.com/metacubex/mihomo`
          in its go.mod — otherwise a normal `go get github.com/<fork>` fails with
          "module declares its path as ... but was required as ...".
          Example: github.com/vernesong/mihomo

permissions:
  contents: write       # to create a branch and commit to it
  pull-requests: write  # to open a PR

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is needed if comparing with history; for
          # simple PR branch creation it's not mandatory, but won't hurt.
          fetch-depth: 0

      - name: Set up Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: core/src/main/golang/go.sum

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Record old version
        id: old
        run: |
          chmod +x gradlew
          OLD=$(./gradlew --no-daemon -q :core:printMihomoVersion | sed -n 's/^mihomo: //p')
          echo "old_version=$OLD" >> "$GITHUB_OUTPUT"
          echo "Old: $OLD"

      - name: Apply dependency update (via :core:bumpMihomo)
        env:
          REF:     ${{ inputs.ref }}
          REPLACE: ${{ inputs.replace_with }}
        run: |
          chmod +x gradlew
          # Delegate work to the Gradle task :core:bumpMihomo. This is the single
          # source of truth for the bump logic (resolving fork ref -> pseudo-version,
          # handling replace, fallback to require). The workflow only
          # orchestrates: checkout, branch, PR.
          if [ -n "$REPLACE" ]; then
            ./gradlew --no-daemon :core:bumpMihomo "-Pref=$REF" "-PreplaceWith=$REPLACE"
          else
            ./gradlew --no-daemon :core:bumpMihomo "-Pref=$REF"
          fi

      # go mod tidy is already executed inside :core:bumpMihomo — separate step not needed.

      - name: Record new version
        id: new
        run: |
          NEW=$(./gradlew --no-daemon -q :core:printMihomoVersion | sed -n 's/^mihomo: //p')
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"
          echo "New: $NEW"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet core/src/main/golang/go.mod core/src/main/golang/go.sum; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "go.mod / go.sum haven't changed — nothing to update."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "=== Diff: ==="
            git --no-pager diff --stat core/src/main/golang/go.mod core/src/main/golang/go.sum
          fi

      - name: Stop if nothing changed
        if: steps.diff.outputs.changed == 'false'
        run: |
          echo "::notice::Already at the latest version mihomo@${{ inputs.ref }}: ${{ steps.old.outputs.old_version }}"
          exit 0

      # Smoke-build arm64 libclash here so that a PR is not opened if the code doesn't compile.
      # For three ABIs we use a separate build-core workflow (triggered by the PR).
      - name: Install Android SDK + NDK
        if: steps.diff.outputs.changed == 'true'
        uses: android-actions/setup-android@v4
        with:
          packages: "ndk;28.2.13676358 cmake;3.22.1"

      - name: Smoke-build arm64 libclash
        if: steps.diff.outputs.changed == 'true'
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :core:buildGoClashArm64V8a

      - name: Compute branch and PR metadata
        if: steps.diff.outputs.changed == 'true'
        id: meta
        env:
          PKG:     github.com/metacubex/mihomo
          REF:     ${{ inputs.ref }}
          REPLACE: ${{ inputs.replace_with }}
        run: |
          # Reflect the REAL code source in the title and branch name:
          # the fork name if there's a replace; otherwise the require name.
          SOURCE="${REPLACE:-$PKG}"
          SHORT=$(basename "$SOURCE")
          DATE=$(date -u +%Y%m%d-%H%M)
          BRANCH="bump/${SHORT}-${DATE}"
          if [ -n "$REPLACE" ]; then
            TITLE="deps: bump $PKG via $REPLACE ($REF)"
          else
            TITLE="deps: bump $PKG ($REF)"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE"   >> "$GITHUB_OUTPUT"

      - name: Commit + push branch
        if: steps.diff.outputs.changed == 'true'
        env:
          PR_TITLE:    ${{ steps.meta.outputs.title }}
          OLD_VERSION: ${{ steps.old.outputs.old_version }}
          NEW_VERSION: ${{ steps.new.outputs.new_version }}
          RUN_ID:      ${{ github.run_id }}
          BRANCH:      ${{ steps.meta.outputs.branch }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add core/src/main/golang/go.mod core/src/main/golang/go.sum
          {
            echo "$PR_TITLE"
            echo
            echo "Old: $OLD_VERSION"
            echo "New: $NEW_VERSION"
            echo
            echo "Triggered by Bump Mihomo workflow (run $RUN_ID)."
            echo "Smoke-build of :core:buildGoClashArm64V8a succeeded in this run;"
            echo "full three-ABI build will run via build-core.yml on the PR."
          } > /tmp/commit_msg.txt
          git commit -F /tmp/commit_msg.txt
          git push origin "$BRANCH"

      - name: Write PR body
        if: steps.diff.outputs.changed == 'true'
        env:
          PKG:         github.com/metacubex/mihomo
          REF:         ${{ inputs.ref }}
          REPLACE:     ${{ inputs.replace_with }}
          OLD_VERSION: ${{ steps.old.outputs.old_version }}
          NEW_VERSION: ${{ steps.new.outputs.new_version }}
          RUN_ID:      ${{ github.run_id }}
          REPO:        ${{ github.repository }}
        run: |
          {
            echo "Automated dependency update via **Bump Mihomo** workflow."
            echo
            echo "| | |"
            echo "|---|---|"
            echo "| Package | \`$PKG\` |"
            if [ -n "$REPLACE" ]; then
              echo "| Replace with | \`$REPLACE\` |"
            fi
            echo "| Ref     | \`$REF\` |"
            echo "| Old     | \`$OLD_VERSION\` |"
            echo "| New     | \`$NEW_VERSION\` |"
            echo "| Run     | [$RUN_ID](https://github.com/$REPO/actions/runs/$RUN_ID) |"
            echo
            echo "## Checks before merge"
            echo
            echo "- [ ] Build Clash Core is green on this branch (runs automatically on PR"
            echo "      and validates build for all 3 ABIs)."
            echo "- [ ] If mihomo ABI or API broke — fix \`core/src/main/golang/native/**\`"
            echo "      manually and push to this branch."
            echo "- [ ] After merge, build-core will run again on main (push trigger),"
            echo "      filling the cache in default scope — and the \`v*\` tag will"
            echo "      build release the usual fast way."
            echo
          } > /tmp/pr_body.md

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.meta.outputs.branch }}" \
            --title "${{ steps.meta.outputs.title }}" \
            --body-file /tmp/pr_body.md
