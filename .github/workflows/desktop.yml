name: Desktop CI

on:
  push:
    paths:
      - 'desktop/**'
  pull_request:
    paths:
      - 'desktop/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: mac
            arch: arm64
          - os: macos-latest
            target: mac
            arch: x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Install deps
        run: npm ci || npm install
      - name: Sync version
        run: npm run sync-version
      - name: Fetch mihomo sidecar
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: npm run fetch-core
      - name: Build helper
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: npm run build:helper
      - name: Rasterize icons
        run: npm run icons
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Smoke proxy
        run: npm run smoke
        continue-on-error: true
      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          TARGET_ARCH: ${{ matrix.arch }}
        shell: bash
        run: |
          if [ -n "${{ matrix.arch }}" ]; then
            npm run dist:${{ matrix.target }} -- --${{ matrix.arch }}
          else
            npm run dist:${{ matrix.target }}
          fi
        continue-on-error: ${{ matrix.target != 'win' }}
      - name: Upload Windows artifacts
        if: matrix.target == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: CheezyClash-windows
          path: |
            desktop/release/*.exe
            desktop/release/*.zip
          if-no-files-found: error
      - name: Upload Linux artifacts
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: CheezyClash-linux
          path: desktop/release/*
          if-no-files-found: ignore
      - name: Upload macOS artifacts
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: CheezyClash-macos-${{ matrix.arch }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
          if-no-files-found: ignore
