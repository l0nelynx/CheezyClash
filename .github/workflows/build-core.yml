name: Build Clash Core

# Собирает libclash.so из Go-исходников для всех ABI и кладёт результат
# в actions/cache по ключу, привязанному к содержимому go-сорсов. После
# успешного запуска release.yml может собрать APK без повторной Go-сборки.
#
# Запускается только вручную (workflow_dispatch). Тег пушит -> release.yml
# тянет libclash из кеша, а не пересобирает.

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Пересобрать libclash даже если кеш есть (debug Go-кода)"
        type: boolean
        default: false
  # PR, трогающий Go-сорсы (включая авто-PR от bump-mihomo) — проверяем
  # сборку. ВАЖНО: actions/cache из PR-сборки scoped на refs/pull/N/merge
  # и НЕ виден с master. Поэтому ниже есть отдельный push-триггер,
  # который перезаполняет кеш в master-scope сразу после merge.
  pull_request:
    paths:
      - 'core/src/main/golang/**'
      - 'core/build.gradle.kts'
      - 'core/src/main/cpp/CMakeLists.txt'
      - '.github/workflows/build-core.yml'
  # После merge в master Go-сорсы изменились — нужно прогреть кеш именно
  # в scope default-ветки, иначе release.yml на следующем теге упадёт.
  push:
    branches: [master]
    paths:
      - 'core/src/main/golang/**'
      - 'core/build.gradle.kts'
      - 'core/src/main/cpp/CMakeLists.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # Ключ кеша: хеш go.sum + всё содержимое cheezy/native + entry-point.
      # Любое изменение Go-исходников или зависимостей invalidate'ит кеш.
      - name: Compute Go sources hash
        id: hash
        run: |
          HASH=$(find core/src/main/golang \( -name '*.go' -o -name 'go.sum' -o -name 'go.mod' \) -type f \
                 | sort | xargs sha256sum | sha256sum | cut -c1-16)
          echo "go_hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Go sources hash: $HASH"

      - name: Restore libclash cache
        id: cache-libclash
        # force_rebuild только из workflow_dispatch; для pull_request inputs пуст.
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.force_rebuild) }}
        uses: actions/cache@v4
        with:
          path: core/build/generatedJniLibs
          key: libclash-${{ steps.hash.outputs.go_hash }}

      - name: Skip build if already cached
        if: steps.cache-libclash.outputs.cache-hit == 'true'
        run: |
          echo "libclash.so для всех ABI уже в кеше под ключом libclash-${{ steps.hash.outputs.go_hash }}"
          ls -lhR core/build/generatedJniLibs/
          exit 0

      - name: Set up JDK 17
        if: steps.cache-libclash.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Go 1.23
        if: steps.cache-libclash.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: core/src/main/golang/go.sum

      - name: Install Android SDK + NDK 28.2.13676358
        if: steps.cache-libclash.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;28.2.13676358 cmake;3.22.1"

      - name: Build libclash.so for all ABIs
        if: steps.cache-libclash.outputs.cache-hit != 'true'
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --parallel \
            :core:buildGoClashArm64V8a \
            :core:buildGoClashArmeabiV7a \
            :core:buildGoClashX86_64 \
            :core:assembleGoJniLibs

      - name: Verify outputs
        if: steps.cache-libclash.outputs.cache-hit != 'true'
        run: |
          for abi in arm64-v8a armeabi-v7a x86_64; do
            f="core/build/generatedJniLibs/$abi/libclash.so"
            test -f "$f" || { echo "ERROR: $f missing"; exit 1; }
            ls -lh "$f"
            file "$f"
          done

      # Опубликовать как workflow artifact, чтобы можно было скачать из UI
      # для отладки или ручной подмены.
      - name: Upload libclash artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libclash-${{ steps.hash.outputs.go_hash }}
          path: core/build/generatedJniLibs/**/libclash.so
          retention-days: 30
          if-no-files-found: error
