name: Build Clash Core

# Builds libclash.so for all ABIs and desktop mihomo sidecars from the same
# Go sources hash. Publishes under tag libclash-<go_hash>:
#   - libclash-<hash>.zip
#   - mihomo-<hash>-<goos>-<goarch>.zip (windows/linux/darwin × amd64/arm64)
# Consumed by Android CI and desktop `npm run fetch-core`.

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Rebuild libclash even if cache exists"
        type: boolean
        default: false
  pull_request:
    paths:
      - 'core/src/main/golang/**'
      - 'core/build.gradle.kts'
      - 'core/src/main/cpp/CMakeLists.txt'
      - '.github/workflows/build-core.yml'
      - '.github/actions/libclash/**'
  push:
    branches: [main]
    paths:
      - 'core/src/main/golang/**'
      - 'core/build.gradle.kts'
      - 'core/src/main/cpp/CMakeLists.txt'
      - '.github/workflows/build-core.yml'
      - '.github/actions/libclash/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Compute Go sources hash
        id: hash
        run: |
          HASH=$(
            cd core/src/main/golang
            find . \( -name '*.go' -o -name 'go.sum' -o -name 'go.mod' \) -type f \
              | LC_ALL=C sort \
              | xargs sha256sum \
              | awk '{print $1}' \
              | sha256sum \
              | cut -c1-16
          )
          echo "go_hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Go sources hash: $HASH"

      - name: Restore libclash cache
        id: cache-libclash
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.force_rebuild) }}
        uses: actions/cache/restore@v6
        with:
          path: core/build/generatedJniLibs
          key: libclash-${{ steps.hash.outputs.go_hash }}

      - name: Skip build if already cached
        if: steps.cache-libclash.outputs.cache-hit == 'true'
        run: |
          echo "libclash.so already cached under libclash-${{ steps.hash.outputs.go_hash }}"
          ls -lhR core/build/generatedJniLibs/

      - name: Set up JDK 17
        if: steps.cache-libclash.outputs.cache-hit != 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Always set up Go: sidecar builds need it even when libclash is cached.
      - name: Set up Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: core/src/main/golang/go.sum

      - name: Install Android SDK + NDK 28.2.13676358
        if: steps.cache-libclash.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v4
        with:
          packages: "ndk;28.2.13676358 cmake;3.22.1"

      - name: Build libclash.so for all ABIs
        if: steps.cache-libclash.outputs.cache-hit != 'true'
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --parallel \
            :core:buildGoClashArm64V8a \
            :core:buildGoClashArmeabiV7a \
            :core:buildGoClashX86_64 \
            :core:assembleGoJniLibs

      - name: Verify outputs
        run: |
          for abi in arm64-v8a armeabi-v7a x86_64; do
            f="core/build/generatedJniLibs/$abi/libclash.so"
            test -f "$f" || { echo "ERROR: $f missing"; exit 1; }
            ls -lh "$f"
            file "$f"
          done

      - name: Save libclash to Actions cache
        if: steps.cache-libclash.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: core/build/generatedJniLibs
          key: libclash-${{ steps.hash.outputs.go_hash }}

      - name: Package libclash zip
        run: |
          HASH="${{ steps.hash.outputs.go_hash }}"
          ZIP="libclash-${HASH}.zip"
          cd core/build/generatedJniLibs
          zip -r "/tmp/${ZIP}" arm64-v8a armeabi-v7a x86_64
          ls -lh "/tmp/${ZIP}"

      - name: Build desktop mihomo sidecars
        run: |
          set -euo pipefail
          HASH="${{ steps.hash.outputs.go_hash }}"
          GO_DIR="$PWD/core/src/main/golang"
          OUT_DIR="$PWD/core/build/mihomo-sidecars"
          mkdir -p "$OUT_DIR"

          # Build from the replaced mihomo module dir so the CLI main graph
          # (e.g. automaxprocs) uses that module's go.sum — cheezy's tidy only
          # covers packages imported by libclash, not mihomo's main package.
          (
            cd "$GO_DIR"
            go mod download github.com/metacubex/mihomo
          )
          MODDIR="$(cd "$GO_DIR" && go list -m -f '{{.Dir}}' github.com/metacubex/mihomo)"
          echo "mihomo module dir: $MODDIR"

          TARGETS=(
            "windows/amd64"
            "windows/arm64"
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )

          for target in "${TARGETS[@]}"; do
            GOOS="${target%%/*}"
            GOARCH="${target##*/}"
            BIN="mihomo"
            if [ "$GOOS" = "windows" ]; then
              BIN="mihomo.exe"
            fi
            STAGE="$OUT_DIR/stage-${GOOS}-${GOARCH}"
            mkdir -p "$STAGE"
            echo "Building mihomo ${GOOS}/${GOARCH}…"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -C "$MODDIR" -tags with_gvisor -trimpath -ldflags="-s -w" \
              -o "$STAGE/$BIN" .
            ZIP="mihomo-${HASH}-${GOOS}-${GOARCH}.zip"
            (cd "$STAGE" && zip -q "${OUT_DIR}/${ZIP}" "$BIN")
            ls -lh "${OUT_DIR}/${ZIP}"
            rm -rf "$STAGE"
          done

      - name: Publish core GitHub Release
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          HASH="${{ steps.hash.outputs.go_hash }}"
          TAG="libclash-${HASH}"
          LIBZIP="/tmp/libclash-${HASH}.zip"
          SIDE_DIR="$PWD/core/build/mihomo-sidecars"
          NOTES="Prebuilt libclash.so and desktop mihomo sidecars for Go sources hash \`${HASH}\`. Used by CheezyVPN / desktop fetch-core."

          SIDECARS=(
            "mihomo-${HASH}-windows-amd64.zip"
            "mihomo-${HASH}-windows-arm64.zip"
            "mihomo-${HASH}-linux-amd64.zip"
            "mihomo-${HASH}-linux-arm64.zip"
            "mihomo-${HASH}-darwin-amd64.zip"
            "mihomo-${HASH}-darwin-arm64.zip"
          )

          upload_missing() {
            local existing
            existing="$(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null || true)"
            for path in "$@"; do
              local base
              base="$(basename "$path")"
              if echo "$existing" | grep -Fxq "$base"; then
                echo "Asset $base already on $TAG — skip"
              else
                echo "Uploading $base…"
                gh release upload "$TAG" "$path" --clobber
              fi
            done
          }

          # Mihomo sidecars: always clobber — build flags (e.g. with_gvisor) can
          # change without a go_hash bump, and stale binaries break WireGuard/TUN.
          upload_sidecars() {
            for f in "${SIDECARS[@]}"; do
              echo "Uploading (clobber) $f…"
              gh release upload "$TAG" "${SIDE_DIR}/${f}" --clobber
            done
          }

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — refresh sidecars, fill any missing libclash zip"
            upload_missing "$LIBZIP"
            upload_sidecars
          else
            echo "Creating release $TAG"
            ASSETS=("$LIBZIP")
            for f in "${SIDECARS[@]}"; do
              ASSETS+=("${SIDE_DIR}/${f}")
            done
            gh release create "$TAG" \
              "${ASSETS[@]}" \
              --title "libclash ${HASH}" \
              --notes "$NOTES" \
              --prerelease
          fi

      - name: Upload libclash workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: libclash-${{ steps.hash.outputs.go_hash }}
          path: core/build/generatedJniLibs/**/libclash.so
          retention-days: 30
          if-no-files-found: error

      - name: Upload mihomo sidecar workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mihomo-sidecars-${{ steps.hash.outputs.go_hash }}
          path: core/build/mihomo-sidecars/mihomo-*.zip
          retention-days: 30
          if-no-files-found: error
