name: Build Clash Core

# Builds libclash.so for all ABIs, caches under libclash-<go_hash>, and publishes
# libclash-<go_hash>.zip as a GitHub Release asset (cross-repo consumption by CheezyVPN).

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Rebuild libclash even if cache exists"
        type: boolean
        default: false
  pull_request:
    paths:
      - 'core/src/main/golang/**'
      - 'core/build.gradle.kts'
      - 'core/src/main/cpp/CMakeLists.txt'
      - '.github/workflows/build-core.yml'
      - '.github/actions/libclash/**'
  push:
    branches: [main]
    paths:
      - 'core/src/main/golang/**'
      - 'core/build.gradle.kts'
      - 'core/src/main/cpp/CMakeLists.txt'
      - '.github/workflows/build-core.yml'
      - '.github/actions/libclash/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Compute Go sources hash
        id: hash
        run: |
          HASH=$(find core/src/main/golang \( -name '*.go' -o -name 'go.sum' -o -name 'go.mod' \) -type f \
                 | sort | xargs sha256sum | sha256sum | cut -c1-16)
          echo "go_hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Go sources hash: $HASH"

      - name: Restore libclash cache
        id: cache-libclash
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.force_rebuild) }}
        uses: actions/cache/restore@v4
        with:
          path: core/build/generatedJniLibs
          key: libclash-${{ steps.hash.outputs.go_hash }}

      - name: Skip build if already cached
        if: steps.cache-libclash.outputs.cache-hit == 'true'
        run: |
          echo "libclash.so already cached under libclash-${{ steps.hash.outputs.go_hash }}"
          ls -lhR core/build/generatedJniLibs/

      - name: Set up JDK 17
        if: steps.cache-libclash.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Go 1.23
        if: steps.cache-libclash.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: core/src/main/golang/go.sum

      - name: Install Android SDK + NDK 28.2.13676358
        if: steps.cache-libclash.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v4
        with:
          packages: "ndk;28.2.13676358 cmake;3.22.1"

      - name: Build libclash.so for all ABIs
        if: steps.cache-libclash.outputs.cache-hit != 'true'
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --parallel \
            :core:buildGoClashArm64V8a \
            :core:buildGoClashArmeabiV7a \
            :core:buildGoClashX86_64 \
            :core:assembleGoJniLibs

      - name: Verify outputs
        run: |
          for abi in arm64-v8a armeabi-v7a x86_64; do
            f="core/build/generatedJniLibs/$abi/libclash.so"
            test -f "$f" || { echo "ERROR: $f missing"; exit 1; }
            ls -lh "$f"
            file "$f"
          done

      - name: Save libclash to Actions cache
        if: steps.cache-libclash.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: core/build/generatedJniLibs
          key: libclash-${{ steps.hash.outputs.go_hash }}

      - name: Package libclash zip
        run: |
          HASH="${{ steps.hash.outputs.go_hash }}"
          ZIP="libclash-${HASH}.zip"
          cd core/build/generatedJniLibs
          zip -r "/tmp/${ZIP}" arm64-v8a armeabi-v7a x86_64
          ls -lh "/tmp/${ZIP}"

      - name: Publish libclash GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HASH="${{ steps.hash.outputs.go_hash }}"
          TAG="libclash-${HASH}"
          ZIP="libclash-${HASH}.zip"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping upload"
            exit 0
          fi
          gh release create "$TAG" "/tmp/${ZIP}" \
            --title "libclash ${HASH}" \
            --notes "Prebuilt libclash.so for Go sources hash \`${HASH}\`. Used by CheezyVPN CI." \
            --prerelease

      - name: Upload libclash workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: libclash-${{ steps.hash.outputs.go_hash }}
          path: core/build/generatedJniLibs/**/libclash.so
          retention-days: 30
          if-no-files-found: error
