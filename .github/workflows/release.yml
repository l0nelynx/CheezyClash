name: Build and Release (Open Source)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Acquire libclash
        uses: ./.github/actions/libclash
        with:
          allow-build-fallback: 'false'

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK + NDK 28.2.13676358
        uses: android-actions/setup-android@v4
        with:
          packages: "ndk;28.2.13676358 cmake;3.22.1"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > release.jks

      - name: Build Direct Open Release APK
        run: |
          ./gradlew --no-daemon assembleDirectOpenRelease \
            -x :core:buildGoClashArm64V8a \
            -x :core:buildGoClashArmeabiV7a \
            -x :core:buildGoClashX86_64 \
            -x :core:assembleGoJniLibs
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CheezyClash-APKs
          path: app/build/outputs/apk/directOpen/release/*.apk

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: ubuntu-latest
            target: linux
          # macos-latest is arm64; build x64 via cross-compile + TARGET_ARCH
          - os: macos-latest
            target: mac
            arch: arm64
          - os: macos-latest
            target: mac
            arch: x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Install deps
        run: npm ci || npm install
      - name: Sync version
        run: npm run sync-version
      - name: Verify version matches tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(node -p "require('./package.json').version")
          if [ "$VER" != "$TAG" ]; then
            echo "desktop version $VER != tag $TAG"
            exit 1
          fi
      - name: Fetch mihomo sidecar
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: npm run fetch-core
      - name: Build helper
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: npm run build:helper
      - name: Icons
        run: npm run icons
      - name: Typecheck / build
        run: npm run typecheck && npm run build
      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          TARGET_ARCH: ${{ matrix.arch }}
        shell: bash
        run: |
          if [ -n "${{ matrix.arch }}" ]; then
            npm run dist:${{ matrix.target }} -- --${{ matrix.arch }}
          else
            npm run dist:${{ matrix.target }}
          fi
        continue-on-error: ${{ matrix.target != 'win' }}
      - name: Upload Windows desktop artifacts
        if: matrix.target == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: CheezyClash-desktop-win
          path: |
            desktop/release/*.exe
            desktop/release/*.zip
          if-no-files-found: error
      - name: Upload Linux desktop artifacts
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: CheezyClash-desktop-linux
          path: desktop/release/*
          if-no-files-found: ignore
      - name: Upload macOS desktop artifacts
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: CheezyClash-desktop-mac-${{ matrix.arch }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
          if-no-files-found: ignore

  publish:
    needs: [android, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"• %s")
          else
            CHANGES=$(git log --pretty=format:"• %s" $PREV_TAG..${{ github.ref_name }})
          fi
          {
            echo "CHANGES<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-assets/CheezyClash-APKs/*
            release-assets/CheezyClash-desktop-win/*
            release-assets/CheezyClash-desktop-linux/*
            release-assets/CheezyClash-desktop-mac-arm64/*
            release-assets/CheezyClash-desktop-mac-x64/*
          body: |
            ## What's New
            ${{ steps.changelog.outputs.CHANGES }}

            ## Downloads
            ### Android
            - Direct Open APK(s) attached below

            ### Desktop
            - **Windows:** installer (`.exe`) + portable (`.zip`)
            - **macOS:** `arm64` and `x64` (`.dmg` / `.zip`) when matrix jobs succeed
            - **Linux:** attached when the matrix job succeeded
          generate_release_notes: true
          fail_on_unmatched_files: false

      - name: Trigger proprietary release
        env:
          GH_TOKEN: ${{ secrets.PROPRIETARY_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Proprietary dispatch token is not set — skipping proprietary overlay dispatch."
            exit 0
          fi
          jq -n \
            --arg tag "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            '{event_type:"open_release",client_payload:{tag:$tag,sha:$sha,desktop:true}}' \
          | gh api --method POST /repos/l0nelynx/CheezyVPN_android/dispatches --input -

      - name: Send Telegram Notification
        continue-on-error: true
        uses: appleboy/telegram-action@221e6b684967abe813051ee4a37dd61770a83ad3
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🚀 *New Release: CheezyClash ${{ github.ref_name }}*

            Android APK + Desktop builds are in the same release.

            *Changes:*
            ${{ steps.changelog.outputs.CHANGES }}

            📦 [Download](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})
