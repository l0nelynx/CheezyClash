name: Build and Release (Open Source)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Acquire libclash
        id: libclash
        uses: ./.github/actions/libclash
        with:
          allow-build-fallback: 'false'

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK + NDK 28.2.13676358
        uses: android-actions/setup-android@v4
        with:
          packages: "ndk;28.2.13676358 cmake;3.22.1"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > release.jks

      - name: Build Direct Open Release APK
        run: |
          ./gradlew --no-daemon assembleDirectOpenRelease \
            -x :core:buildGoClashArm64V8a \
            -x :core:buildGoClashArmeabiV7a \
            -x :core:buildGoClashX86_64 \
            -x :core:assembleGoJniLibs
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: CheezyClash-APKs
          path: app/build/outputs/apk/directOpen/release/*.apk

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"• %s")
          else
            CHANGES=$(git log --pretty=format:"• %s" $PREV_TAG..${{ github.ref_name }})
          fi
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: app/build/outputs/apk/directOpen/release/*.apk
          body: |
            ## What's New
            ${{ steps.changelog.outputs.CHANGES }}
          generate_release_notes: true

      - name: Trigger proprietary release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PROPRIETARY_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ERROR: PROPRIETARY_DISPATCH_TOKEN is not set"
            exit 1
          fi
          jq -n \
            --arg tag "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            '{event_type:"open_release",client_payload:{tag:$tag,sha:$sha}}' \
          | gh api --method POST /repos/l0nelynx/CheezyVPN_android/dispatches --input -

      - name: Send Telegram Notification
        if: success()
        continue-on-error: true
        uses: appleboy/telegram-action@221e6b684967abe813051ee4a37dd61770a83ad3
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🚀 *New Release: CheezyClash ${{ github.ref_name }}*

            *Changes:*
            ${{ steps.changelog.outputs.CHANGES }}

            📦 [Download Release ${{ github.ref_name }}](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})
